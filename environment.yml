# Dedicated conda environment for the tcren Python library.
#
# Provides Python, the MMseqs2 binary (used by arda and by Phase-B MHC mapping), and a
# C++ toolchain so the arda extension can be built on install. arda is a pinned git
# dependency of tcren (see pyproject.toml), pulled in by `pip install -e .`.
#
#   conda env create -f environment.yml
#   conda activate tcren
#   pip install -e .
#
name: tcren
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - mmseqs2
  - cxx-compiler
  - cmake
  - pip
  - numpy>=1.26
  - scipy>=1.11
  - biopython>=1.84
  - pip:
      - polars>=1.0
      - typer>=0.12
      - requests>=2.31
      # arda's C++ extension build deps (the conda cxx-compiler/cmake above do the build).
      # arda itself is a pinned git dependency in pyproject.toml, installed by pip install -e .
      - scikit-build-core>=0.10
      - pybind11>=2.12
