# Dedicated conda environment for the tcren Python library.
#
# Provides Python, the MMseqs2 binary (used by arda and by Phase-B MHC mapping), and a
# C++ toolchain so the arda extension can be built. arda itself is installed from the
# sibling checkout by setup.sh.
#
#   conda env create -f environment.yml
#   conda activate tcren
#   pip install -e .          # plus -e ../arda (see setup.sh)
#
name: tcren
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - mmseqs2
  - cxx-compiler
  - cmake
  - pip
  - numpy>=1.26
  - scipy>=1.11
  - biopython>=1.84
  - pip:
      - polars>=1.0
      - typer>=0.12
      - scikit-build-core>=0.10
      - pybind11>=2.12
