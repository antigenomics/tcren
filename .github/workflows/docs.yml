name: docs

on:
  push:
    branches: [dev, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs toolchain
        # autodoc imports tcren with heavy deps mocked (see docs/conf.py:autodoc_mock_imports),
        # so arda / the native toolchain are not needed to build docs.
        run: pip install sphinx pydata-sphinx-theme nbsphinx polars numpy typer requests
      - name: Build HTML (fail on warnings)
        run: sphinx-build -W --keep-going -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
