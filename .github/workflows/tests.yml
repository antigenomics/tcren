name: tests

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (lean runtime + test extra)
        # The `slow` tests invoke arda / mmseqs2 per structure and need the conda toolchain;
        # they are deselected here. matplotlib is added for the pure-SVG viz tests. arda is
        # imported lazily, so the non-slow suite runs without it.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" matplotlib
      - name: Run unit tests (deselect arda/mmseqs-backed slow tests)
        run: pytest -m "not slow" -ra
