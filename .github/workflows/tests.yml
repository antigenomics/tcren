name: tests

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Build tooling for the C++ extension
        # tcren ships a pybind11 fitting-alignment extension (src/_align), built by
        # scikit-build-core; cmake + ninja + a C++ compiler are required (gcc is on the runner).
        run: python -m pip install --upgrade pip cmake ninja
      - name: Install package without arda (lean unit suite)
        # arda is a pinned git dependency for real use, but the non-slow suite imports it lazily
        # (importorskip) and CI has no arda reference database — so install tcren --no-deps and
        # add the runtime deps explicitly, minus arda. The C++ ext is still built and tested.
        run: |
          pip install -e . --no-deps
          pip install biopython scipy numpy polars typer requests huggingface_hub \
                      pytest pytest-cov matplotlib
      - name: Run unit tests (arda/mmseqs-backed tests skip without arda)
        run: pytest -m "not slow" -ra
